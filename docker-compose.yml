---
services:
  code-server:
    image: lscr.io/linuxserver/code-server:4.110.0
    container_name: code-server
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-Etc/UTC}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=${NO_PROXY:-127.0.0.1,localhost}
      - http_proxy=${HTTP_PROXY:-}
      - https_proxy=${HTTPS_PROXY:-}
      - no_proxy=${NO_PROXY:-127.0.0.1,localhost}
      # - HASHED_PASSWORD=${CODE_SERVER_HASHED_PASSWORD:?set CODE_SERVER_HASHED_PASSWORD in .env}
      - DEFAULT_WORKSPACE=/repos #optional
      - PWA_APPNAME=code-server #optional
    volumes:
      - ./config:/config
      - ./repos:/repos
      - ./vsix:/vsix:ro
    # security_opt:
    #   - no-new-privileges:true
    # cap_drop:
    #   - ALL
    # cap_add:
    #   - SETUID
    #   - SETGID
    # read_only: true
    # tmpfs:
    #   - /tmp:rw,exec,nosuid,nodev
    #   - /run:rw,exec,nosuid,nodev
    #   - /var/run:rw,exec,nosuid,nodev
    ports:
      - ${CODE_SERVER_BIND_IP:-127.0.0.1}:${CODE_SERVER_PORT:-8443}:8443
    restart: unless-stopped
